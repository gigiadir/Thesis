base_results_dir: "~/CCC-scDiffCom/results/split-by-rank-genes-v2"
output_dir: "~/Thesis/CCC/outputs/scDiffCom/reproducibility_atlas/v1-v2"
cohorts:
  - Kurten_HNSC
  - Puram_HNSC
  - Choi_HNSC
  - Bill_HNSC
gene_universe: intersection
vocab_mode: intersection
de_filter: true
eb_shrink: false
n_perm: 1000
null_checkpoint_every: 50
null_max_cores: 64
reproscore_threshold: 0.95  # legacy; atlas membership uses evt_FDR (Stage 6)
fdr_threshold: 0.05
min_genes_per_cci: 10
# --- Advisor R_g methodology ---
rg_aggregate: median        # median (advisor) or mean of the <=6 pairwise Spearman rho
min_cci_overlap: 10         # min jointly-finite CCIs for a pairwise correlation
atlas_min_pairs: 1          # min computable cohort pairs for atlas membership
# EVT / GPD tail calibration (Knijnenburg 2009)
evt_n_exc: 250              # exceedances for the GPD tail fit
evt_gof_alpha: 0.05         # Anderson-Darling GOF alpha (shrink n_exc by 10 on failure)
evt_exceedance_min: 10      # empirical -> GPD switch (min null values >= obs)
evt_gof_boot: 199           # parametric-bootstrap replicates for the AD GOF test
perm_block: null
malignant_celltype:
  - Tumor
seed: 42
filter_unknown_celltypes: true
atlas_provenance_note: "All 4 cohorts are HNSCC Atlas project subsets"
